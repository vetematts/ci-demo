name: Create and Upload Docker Image

on:
  workflow_dispatch:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: ${{ github.repository }}
  REGISTRY: ghcr.io

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata action
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push Docker images
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_REGION: ap-southeast-2
      ECS_CLUSTER: # TODO: Enter your ECS cluster name
      ECS_SERVICE: # TODO: Enter your ECS service name
      ECS_TASK_DEFINITION: # TODO: Enter path to your task definition file
    steps:
      - run: echo "Add deployment steps here (e.g., aws-actions/amazon-ecs-deploy-task-definition)"
