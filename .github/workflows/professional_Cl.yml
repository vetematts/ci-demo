name: Professional CI

on:
    push:
        branches: ["main"]

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v4.0.3
              with:
                node-version: "24"
                cache: "npm"
            - run: npm ci
            - run: npm run lint

    test:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: ["20", "24"]
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v4.0.3
              with:
                node-version: ${{ matrix.node-version }}
                cache: "npm"
            - run: npm ci
            - run: npm test > report.txt
            - uses: actions/upload-artifact@v7.0.0
              with:
                name: test-report-${{ matrix.node-version }}
                path: report.txt

    build:
        needs: [lint, test]
        runs-on: ubuntu-latest
        steps:
            - run: echo "Building application..."

